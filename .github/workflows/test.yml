name: Nesine WS Test

on:
  workflow_dispatch:   # Manuel tetikle
  push:
    paths:
      - 'nesine_ws_test/**'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Run WS test (60sn)
        run: dart run bin/main.dart
